name: Daily Price Refresh

on:
  schedule:
    - cron: "0 17 * * 1-5"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: ""

      - name: Install dependencies
        env:
          PIP_NO_CACHE_DIR: "1"
        run: pip install --force-reinstall "supabase==2.3.0" "yfinance==1.4.0" "websockets==13.1" python-dotenv pandas plotly "httpx==0.27.0"

      - name: Run price refresh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          pip show yfinance
          pip show websockets
          python update_prices.py
